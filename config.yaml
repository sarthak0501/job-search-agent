app:
  timezone: "America/Los_Angeles"

# ── User profile ──────────────────────────────────────────────────────────────
# Scoring compares job postings against this profile.
# Edit target_titles, skills, and locations to match your background.
profile:
  target_titles:
    - "senior data scientist"
    - "data scientist"
    - "applied scientist"
    - "senior applied scientist"
    - "staff data scientist"
    - "principal data scientist"
    - "ml engineer"
    - "machine learning engineer"
    - "data science manager"
  skills:
    - python
    - sql
    - pyspark
    - machine learning
    - statistical modeling
    - nlp
    - azure
    - data pipelines
    - telemetry
    - experimentation
    - multi-armed bandit
    - optimization
    - clustering
    - classification
    - llm
    - power bi
    - tableau
    - r
  locations:
    - "redmond"
    - "seattle"
    - "remote"
    - "new york"

# ── Compliance ────────────────────────────────────────────────────────────────
compliance:
  obey_robots_txt: true
  user_agent: "job-search-agent/1.0 (+https://example.com)"
  allow_domains: []         # empty = allow all except denied
  deny_domains: ["linkedin.com", "www.linkedin.com"]
  rate_limits:
    default_per_minute: 10000
    overrides:
      boards-api.greenhouse.io: 10000
      api.lever.co: 10000
      job-boards.greenhouse.io: 10000
      boards.greenhouse.io: 10000
      app.careerpuck.com: 10000

# ── Sources ───────────────────────────────────────────────────────────────────
# Add company slugs under each plugin.
# Greenhouse slug = the subdomain on their job board (e.g. greenhouse.io/reddit)
# Lever slug      = company name used in lever.co/jobs/<slug>
sources:
  - plugin: "greenhouse"
    enabled: true
    companies:
      - "reddit"
      - "airbnb"
      - "stripe"
      - "databricks"
      - "lyft"
      - "robinhood"
      - "twilio"
      - "waymo"
      - "duolingo"
      - "klaviyo"
      - "brex"

  - plugin: "lever"
    enabled: true
    companies:
      - "netflix"
      - "scale"
      - "gemini"

# ── Scoring ───────────────────────────────────────────────────────────────────
scoring:
  base: "hybrid_v1"
  threshold: 50            # minimum score (0-100) to store a job
